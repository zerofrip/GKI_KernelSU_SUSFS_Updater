name: Setup Wild KSU
description: Download and configure Wild KSU with version tracking

runs:
  using: composite
  steps:
    # =========================================================================
    # Step 1: Verify and move Wild_KSU into the kernel tree
    #
    # Wild_KSU is downloaded as part of the build-dependencies artifact in
    # dependencies.yml (cloned from WildKernels/Wild_KSU). The artifact is
    # extracted to $GITHUB_WORKSPACE. We need to move it into kernel/ so
    # setup.sh can find the kernel source tree.
    #
    # Common failure causes:
    #   - Artifact didn't preserve execute permissions → chmod +x
    #   - Wild_KSU directory missing from artifact → fail with clear message
    # =========================================================================
    - name: Debug - Verify Wild_KSU Exists
      shell: bash
      run: |
        echo "=== Debug: Current working directory ==="
        pwd

        echo "=== Debug: Listing \$GITHUB_WORKSPACE ==="
        ls -la "$GITHUB_WORKSPACE/"

        echo "=== Debug: Checking Wild_KSU directory ==="
        if [ ! -d "$GITHUB_WORKSPACE/Wild_KSU" ]; then
          echo "ERROR: Wild_KSU directory not found at \$GITHUB_WORKSPACE/Wild_KSU"
          echo "The build-dependencies artifact may not have been downloaded correctly."
          echo ""
          echo "Expected location: $GITHUB_WORKSPACE/Wild_KSU"
          echo "Available directories:"
          find "$GITHUB_WORKSPACE" -maxdepth 1 -type d | sort
          exit 1
        fi

        echo "Wild_KSU found at: $GITHUB_WORKSPACE/Wild_KSU"
        echo "=== Debug: Wild_KSU contents ==="
        ls -la "$GITHUB_WORKSPACE/Wild_KSU/"
        echo "=== Debug: Wild_KSU/kernel/ contents ==="
        ls -la "$GITHUB_WORKSPACE/Wild_KSU/kernel/" 2>/dev/null || echo "  (kernel/ subdirectory not found)"

    - name: Setup Wild KSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        # Copy Wild_KSU into the kernel tree.
        # Note: Using cp -r instead of mv because artifact downloads may be on
        # different filesystems, and cp is always safe.
        if [ -d "$GITHUB_WORKSPACE/Wild_KSU" ]; then
          cp -r "$GITHUB_WORKSPACE/Wild_KSU" ./Wild_KSU
        else
          echo "ERROR: Wild_KSU not found at $GITHUB_WORKSPACE/Wild_KSU"
          exit 1
        fi

        # The Wild_KSU repo structure is:
        #   Wild_KSU/kernel/setup.sh  — for kernel builds (this workflow)
        #   Wild_KSU/manager/setup.sh — for manager builds (not used here)
        # There is NO setup.sh at the Wild_KSU root.
        if [ ! -f "./Wild_KSU/kernel/setup.sh" ]; then
          echo "ERROR: Wild_KSU/kernel/setup.sh not found!"
          echo "Contents of Wild_KSU:"
          ls -laR ./Wild_KSU/
          exit 1
        fi

        # Restore execute permission — artifact upload/download strips file
        # permissions, so we must explicitly chmod +x before running.
        chmod +x ./Wild_KSU/kernel/setup.sh

        # Ensure full git history and tags are available.
        # setup.sh relies on: git describe, git rev-list, origin/HEAD
        # These ALL fail in shallow clones. Even though dependencies.yml now
        # does a full clone, artifact transfer can lose git metadata, so we
        # explicitly fetch to be safe.
        cd ./Wild_KSU
        git fetch --prune --unshallow 2>/dev/null || true
        git fetch --tags --force 2>/dev/null || true
        # Set origin/HEAD if it doesn't exist (common in CI environments)
        git remote set-head origin -a 2>/dev/null || true
        cd ..

        echo "Running Wild_KSU/kernel/setup.sh..."
        ./Wild_KSU/kernel/setup.sh

    - name: Enable KernelSU Config
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # KernelSU Configuration
        CONFIG_KSU=y
        EOF
    
    - name: Extract KSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/Wild_KSU
      run: |
        # Extract and export KSU version info
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null)
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        KSU_VERSION=$((30000 + KSU_GIT_VERSION))
        
        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
