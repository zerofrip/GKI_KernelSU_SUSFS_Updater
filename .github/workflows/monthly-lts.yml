# =============================================================================
# monthly-lts.yml
# Monthly cron-triggered workflow that:
#   1. Checks upstream Android kernel repos for new LTS commits
#   2. Builds all LTS kernels only if upstream has changed
#   3. Creates a GitHub Release with permanent download URLs
#   4. Generates Franco Kernel Manager (FKM) compatible JSON files
#   5. Publishes JSON files to the 'fkm-json' branch
#
# LTS Detection:
#   LTS kernels use the "X.Y.X-androidNN-lts" format where the sublevel (X)
#   is resolved at build time to the latest available from Google's repo.
#   The 7 LTS branches are defined in .github/kernel-config/lts.json.
#
# Monthly Trigger:
#   Cron runs at 00:00 UTC on the 1st of each month.
#   The check-upstream job compares remote HEAD hashes against a cached file
#   (upstream-hashes.json) stored on the 'fkm-json' branch.
#   Builds only proceed if at least one upstream branch has new commits.
# =============================================================================

name: Monthly LTS Build

permissions:
  contents: write
  actions: write

on:
  # Monthly cron: 1st of every month at midnight UTC
  schedule:
    - cron: '0 0 1 * *'
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even without upstream changes'
        type: boolean
        default: false
      feature_set:
        description: 'Feature Set'
        type: choice
        options:
          - WKSU+SUSFS+BBG
          - WKSU+BBG
          - WKSU
          - BBG
          - None
        default: WKSU+SUSFS+BBG

jobs:
  # ===========================================================================
  # Job 1: Check Upstream for Changes
  # Uses git ls-remote to check each LTS branch's HEAD commit hash against
  # a cached file. If any hash differs, the build proceeds.
  # ===========================================================================
  check-upstream:
    name: Check Upstream Changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.compare.outputs.has_changes }}
      changed_branches: ${{ steps.compare.outputs.changed_branches }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Try to fetch cached hashes from the fkm-json branch
      - name: Fetch Cached Hashes
        id: cache
        run: |
          # Attempt to download the cached upstream hashes from fkm-json branch
          if git fetch origin fkm-json 2>/dev/null; then
            git show origin/fkm-json:upstream-hashes.json > /tmp/cached-hashes.json 2>/dev/null || echo '{}' > /tmp/cached-hashes.json
          else
            echo "fkm-json branch does not exist yet, treating all as changed"
            echo '{}' > /tmp/cached-hashes.json
          fi
          echo "Cached hashes:"
          cat /tmp/cached-hashes.json

      # Query upstream repos and compare with cached hashes
      - name: Compare Upstream Hashes
        id: compare
        run: |
          # LTS branch mapping:
          # Kernel version format -> Google repo branch
          # The Android kernel common repo uses branches like:
          #   common-android12-5.10-lts, common-android13-5.10-lts, etc.
          declare -A LTS_BRANCHES=(
            ["5.10-android12"]="common-android12-5.10-lts"
            ["5.10-android13"]="common-android13-5.10-lts"
            ["5.15-android13"]="common-android13-5.15-lts"
            ["5.15-android14"]="common-android14-5.15-lts"
            ["6.1-android14"]="common-android14-6.1-lts"
            ["6.6-android15"]="common-android15-6.6-lts"
            ["6.12-android16"]="common-android16-6.12-lts"
          )

          UPSTREAM_REPO="https://android.googlesource.com/kernel/common"
          HAS_CHANGES="false"
          CHANGED=""
          NEW_HASHES="{}"

          for key in "${!LTS_BRANCHES[@]}"; do
            branch="${LTS_BRANCHES[$key]}"
            echo "Checking $key -> $branch ..."

            # Get remote HEAD hash
            REMOTE_HASH=$(git ls-remote "$UPSTREAM_REPO" "refs/heads/$branch" 2>/dev/null | awk '{print $1}' || echo "")

            if [[ -z "$REMOTE_HASH" ]]; then
              echo "  WARNING: Could not fetch hash for branch $branch"
              continue
            fi

            # Get cached hash
            CACHED_HASH=$(jq -r --arg k "$key" '.[$k] // ""' /tmp/cached-hashes.json)

            echo "  Remote: $REMOTE_HASH"
            echo "  Cached: $CACHED_HASH"

            # Build new hashes JSON
            NEW_HASHES=$(echo "$NEW_HASHES" | jq --arg k "$key" --arg v "$REMOTE_HASH" '. + {($k): $v}')

            if [[ "$REMOTE_HASH" != "$CACHED_HASH" ]]; then
              echo "  -> CHANGED!"
              HAS_CHANGES="true"
              CHANGED="${CHANGED}${key},"
            else
              echo "  -> unchanged"
            fi
          done

          # Save new hashes for later use
          echo "$NEW_HASHES" > /tmp/new-hashes.json
          echo "New hashes:"
          cat /tmp/new-hashes.json

          # Handle force_build input
          if [[ "${{ inputs.force_build }}" == "true" ]]; then
            echo "Force build requested — overriding change detection"
            HAS_CHANGES="true"
          fi

          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT
          echo "changed_branches=$CHANGED" >> $GITHUB_OUTPUT
          echo "Result: has_changes=$HAS_CHANGES changed=$CHANGED"

      # Upload new hashes as artifact for the publish job
      - name: Upload New Hashes
        uses: actions/upload-artifact@v4
        with:
          name: upstream-hashes
          path: /tmp/new-hashes.json
          retention-days: 1

  # ===========================================================================
  # Job 2: Download Build Dependencies
  # Only runs if upstream has changes (or force_build is true)
  # ===========================================================================
  download-dependencies:
    needs: check-upstream
    if: ${{ needs.check-upstream.outputs.has_changes == 'true' }}
    uses: ./.github/workflows/dependencies.yml

  # ===========================================================================
  # Job 3: Build LTS Kernels
  # Builds all 7 LTS kernel versions using the reusable build.yml workflow.
  # Each kernel version uses "X.Y.X-androidNN-lts" format where the sublevel
  # is resolved to the latest available at build time.
  # ===========================================================================
  build-lts:
    needs: [check-upstream, download-dependencies]
    if: ${{ needs.check-upstream.outputs.has_changes == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        kernel_version:
          - "5.10.X-android12-lts"
          - "5.10.X-android13-lts"
          - "5.15.X-android13-lts"
          - "5.15.X-android14-lts"
          - "6.1.X-android14-lts"
          - "6.6.X-android15-lts"
          - "6.12.X-android16-lts"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      kernel_version: ${{ matrix.kernel_version }}
      ksu_commit: ''
      feature_set: ${{ inputs.feature_set || 'WKSU+SUSFS+BBG' }}

  # ===========================================================================
  # Job 4: Create GitHub Release
  # Creates a tagged release and uploads all AnyKernel3 zips as assets.
  # These release asset URLs are permanent and used in FKM JSON files.
  # ===========================================================================
  release:
    runs-on: ubuntu-latest
    needs: build-lts
    if: ${{ needs.build-lts.result == 'success' }}
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate New Tag
        id: tag
        run: |
          # Generate an auto-incrementing tag for the monthly LTS release
          LATEST_TAG=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name' 2>/dev/null || echo "v0.0.0")
          if [[ -z "$LATEST_TAG" || "$LATEST_TAG" == "null" ]]; then
            LATEST_TAG="v0.0.0"
          fi

          if [[ "$LATEST_TAG" =~ ^(.*)-r([0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            REV="${BASH_REMATCH[2]}"
            NEW_REV=$((REV + 1))
            NEW_TAG="${VERSION}-r${NEW_REV}"
          else
            NEW_TAG="${LATEST_TAG}-r1"
          fi

          echo "Latest tag: $LATEST_TAG"
          echo "New tag: $NEW_TAG"
          echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Set Release Body
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%d)
          cat << 'EOF' > release_body.md

          ## 🌙 Monthly LTS Kernel Build

          **Build Date:** BUILD_DATE_PLACEHOLDER
          **Build Type:** LTS (Long Term Support) Only

          These kernels track the latest Long Term Support releases from Google's
          Android kernel common repository.

          ### 📦 Included LTS Versions
          - `5.10.X-android12-lts`
          - `5.10.X-android13-lts`
          - `5.15.X-android13-lts`
          - `5.15.X-android14-lts`
          - `6.1.X-android14-lts`
          - `6.6.X-android15-lts`
          - `6.12.X-android16-lts`

          ### ✨ Features
          - 🔐 Wild KSU Manager Support
          - 🛡️ SUSFS v2.0.0 + Inline Hooks
          - 🛡️ Baseband-guard (BBG)
          - 🔌 WireGuard Support

          ### 📱 Franco Kernel Manager
          FKM-compatible JSON files are available on the `fkm-json` branch.

          ### ⚠️ Disclaimer
          Flashing this kernel will void your warranty. Use at your own risk.
          EOF
          sed -i "s/BUILD_DATE_PLACEHOLDER/$BUILD_DATE/" release_body.md

      - name: Create GitHub Release
        run: |
          gh release create "$NEW_TAG" \
            --title "Monthly LTS Build - $(date -u +%Y-%m-%d)" \
            --notes-file release_body.md \
            --target "${{ github.sha }}"

      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./downloaded-artifacts
          pattern: '*-AnyKernel3'

      - name: Upload Release Assets
        run: |+
          shopt -s nullglob
          mapfile -t anykernel_dirs < <(find ./downloaded-artifacts -maxdepth 2 -type d -name '*-AnyKernel3' -print)

          # Create zips in parallel
          for dir in "${anykernel_dirs[@]}"; do
            artifact_name=$(basename "$dir")
            (cd "$dir" && zip -r -q -9 "$GITHUB_WORKSPACE/${artifact_name}.zip" ./*) &
          done
          wait

          # Upload each zip to the release
          for dir in "${anykernel_dirs[@]}"; do
            artifact_name=$(basename "$dir")
            gh release upload "$NEW_TAG" "$GITHUB_WORKSPACE/${artifact_name}.zip" --clobber
          done

  # ===========================================================================
  # Job 5: Generate and Publish FKM JSON Files
  # After a successful release, generates a Franco Kernel Manager compatible
  # JSON file for each built LTS kernel and commits them to the 'fkm-json'
  # branch. Also updates the upstream hash cache.
  #
  # FKM JSON contains:
  #   - version: Full kernel version string
  #   - link: Permanent GitHub Release asset download URL
  #   - changelog_url: Link to the GitHub Release page
  #   - build date and SHA1 hash
  # ===========================================================================
  publish-fkm-json:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.result == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download AnyKernel3 Artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./downloaded-artifacts
          pattern: '*-AnyKernel3'

      - name: Download Upstream Hashes
        uses: actions/download-artifact@v5
        with:
          name: upstream-hashes
          path: ./hashes

      - name: Generate FKM JSON Files
        env:
          RELEASE_TAG: ${{ needs.release.outputs.new_tag }}
        run: |
          set -euo pipefail
          BUILD_DATE=$(date -u +%Y-%m-%d)
          REPO="${{ github.repository }}"
          JSON_DIR="./fkm-json-output"
          mkdir -p "$JSON_DIR"

          echo "=== Generating FKM JSON files ==="
          echo "Release tag: $RELEASE_TAG"
          echo "Build date:  $BUILD_DATE"

          # Find all AnyKernel3 artifact directories
          shopt -s nullglob
          for dir in ./downloaded-artifacts/*-AnyKernel3; do
            [ -d "$dir" ] || continue
            artifact_name=$(basename "$dir")

            # Create zip and compute SHA1
            (cd "$dir" && zip -r -q -9 "/tmp/${artifact_name}.zip" ./*)
            SHA1=$(sha1sum "/tmp/${artifact_name}.zip" | awk '{print $1}')

            # Parse version from artifact name: "6.6.118-android15-lts-AnyKernel3"
            VERSION="${artifact_name%-AnyKernel3}"

            # Split version into components
            # E.g.: "6.6.118-android15-lts" -> kernel=6.6.118, android=android15, patch=lts
            KERNEL_BASE="${VERSION%%-*}"
            REMAINDER="${VERSION#*-}"
            ANDROID_VER="${REMAINDER%%-*}"
            OS_PATCH="${REMAINDER#*-}"

            OUTPUT_FILE="${JSON_DIR}/kernel-downloads-${VERSION}.json"

            echo "  Generating: $OUTPUT_FILE"
            echo "    Version: $VERSION"
            echo "    SHA1:    $SHA1"

            chmod +x .github/scripts/generate-fkm-json.sh
            .github/scripts/generate-fkm-json.sh \
              --kernel-version "$KERNEL_BASE" \
              --android-version "$ANDROID_VER" \
              --os-patch-level "$OS_PATCH" \
              --release-tag "$RELEASE_TAG" \
              --repo "$REPO" \
              --build-date "$BUILD_DATE" \
              --sha1 "$SHA1" \
              --output "$OUTPUT_FILE"
          done

          echo "=== Generated JSON files ==="
          ls -la "$JSON_DIR"/ || echo "No JSON files generated"

      - name: Publish to fkm-json Branch
        run: |
          set -euo pipefail

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or checkout the fkm-json branch
          if git fetch origin fkm-json 2>/dev/null; then
            git checkout fkm-json
          else
            # Create orphan branch if it doesn't exist
            git checkout --orphan fkm-json
            git rm -rf . 2>/dev/null || true
            echo "# FKM JSON Files" > README.md
            echo "" >> README.md
            echo "This branch contains Franco Kernel Manager compatible JSON files" >> README.md
            echo "for automatic kernel update detection." >> README.md
            git add README.md
          fi

          # Copy generated JSON files
          if [ -d "./fkm-json-output" ] && [ "$(ls -A ./fkm-json-output 2>/dev/null)" ]; then
            cp ./fkm-json-output/*.json . 2>/dev/null || true
          fi

          # Copy updated upstream hashes
          if [ -f "./hashes/new-hashes.json" ]; then
            cp ./hashes/new-hashes.json ./upstream-hashes.json
          fi

          # Generate an index JSON listing all available kernels
          echo '{"kernels": [' > index.json
          FIRST=true
          for f in kernel-downloads-*.json; do
            [ -f "$f" ] || continue
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo ',' >> index.json
            fi
            # Extract version from filename
            VER="${f#kernel-downloads-}"
            VER="${VER%.json}"
            echo "  {\"version\": \"$VER\", \"file\": \"$f\"}" >> index.json
          done
          echo ']' >> index.json
          echo '}' >> index.json

          # Stage and commit
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update FKM JSON files - $(date -u +%Y-%m-%d)"
            git push origin fkm-json
          fi
